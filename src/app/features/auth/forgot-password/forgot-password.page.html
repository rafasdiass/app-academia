<!-- forgot-password.page.html -->
<ion-content [fullscreen]="true" class="auth-content">

  <div class="auth-wrap">

    <!-- ── Estado: formulário ────────────────────────────────────── -->
    <ng-container *ngIf="!sent()">

      <!-- Marca -->
      <header class="auth-brand">
        <div class="auth-brand__mark" aria-hidden="true">
          <span class="auth-brand__bar auth-brand__bar--1"></span>
          <span class="auth-brand__bar auth-brand__bar--2"></span>
          <span class="auth-brand__bar auth-brand__bar--3"></span>
        </div>
        <div class="auth-brand__text">
          <p class="auth-brand__eyebrow">Recuperação</p>
          <h1 class="auth-brand__title">FitTracker</h1>
        </div>
      </header>

      <!-- Card -->
      <div class="auth-card">

        <!-- Descrição -->
        <div class="auth-desc">
          <p class="auth-desc__text">
            Informe o e-mail da sua conta e te enviaremos um link para redefinir a senha.
          </p>
        </div>

        <!-- Erro global -->
        <div class="auth-error" *ngIf="errorMessage()" role="alert" aria-live="assertive">
          <ion-icon name="alert-circle-outline" class="auth-error__icon" aria-hidden="true"></ion-icon>
          <span>{{ errorMessage() }}</span>
        </div>

        <!-- Campo: email -->
        <div class="field">
          <label class="field__label" for="fp-email">E-mail cadastrado</label>
          <div class="field__wrap">
            <ion-icon name="mail-outline" class="field__icon" aria-hidden="true"></ion-icon>
            <input
              id="fp-email"
              class="field__input"
              type="email"
              inputmode="email"
              autocomplete="email"
              placeholder="seu@email.com"
              [(ngModel)]="email"
              (keyup.enter)="submit()"
            />
          </div>
        </div>

        <!-- CTA -->
        <button class="btn-primary" type="button" (click)="submit()" aria-label="Enviar link de recuperação">
          <span>Enviar link</span>
          <ion-icon name="arrow-forward-outline" aria-hidden="true"></ion-icon>
        </button>

        <!-- Voltar -->
        <a class="btn-back" routerLink="/login">
          <ion-icon name="arrow-back-outline" aria-hidden="true"></ion-icon>
          Voltar para o login
        </a>

      </div>

    </ng-container>

    <!-- ── Estado: e-mail enviado ────────────────────────────────── -->
    <ng-container *ngIf="sent()">
      <div class="auth-success" role="status" aria-live="polite">

        <!-- Ícone de sucesso animado -->
        <div class="auth-success__icon-wrap" aria-hidden="true">
          <ion-icon name="checkmark-circle-outline" class="auth-success__icon"></ion-icon>
        </div>

        <h2 class="auth-success__title">Verifique seu e-mail</h2>
        <p class="auth-success__text">
          Enviamos um link de recuperação para<br>
          <strong>{{ email }}</strong>
        </p>
        <p class="auth-success__hint">
          Não recebeu? Verifique a pasta de spam ou
          <button class="auth-success__retry" type="button" (click)="retry()">tente novamente</button>.
        </p>

        <a class="btn-back" routerLink="/login">
          <ion-icon name="arrow-back-outline" aria-hidden="true"></ion-icon>
          Voltar para o login
        </a>

      </div>
    </ng-container>

  </div>

</ion-content>
